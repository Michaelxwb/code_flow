version: 1

budget:
    total: 2500
    l0_max: 800
    l1_max: 1700
    map_max: 400

inject:
    auto: true
    log: false
    code_extensions:
        - ".py"
        - ".ts"
        - ".tsx"
        - ".js"
        - ".jsx"
        - ".go"
        - ".java"
        - ".rs"
        - ".rb"
        - ".vue"
        - ".svelte"
    skip_extensions:
        - ".md"
        - ".txt"
        - ".json"
        - ".yml"
        - ".yaml"
        - ".toml"
        - ".lock"
        - ".csv"
        - ".xml"
        - ".svg"
        - ".png"
        - ".jpg"
        - ".jpeg"
        - ".gif"
        - ".ico"
        - ".pdf"
        - ".zip"
        - ".gz"
        - ".tar"
    skip_paths:
        - "docs/**"
        - "*.config.*"
        - ".code-flow/**"
        - ".claude/**"
        - ".costrict/**"
        - "node_modules/**"
        - "dist/**"
        - "build/**"
        - "out/**"
        - "coverage/**"
        - ".next/**"
        - ".cache/**"
        - ".venv/**"
        - "venv/**"
        - "__pycache__/**"
        - ".git/**"

path_mapping:
    cli:
        patterns:
            - "src/cli.js"
            - "src/adapters/**/*.json"
            - "src/adapters/**/*.toml"
        specs:
            - path: "cli/_map.md"
              tags: ["*"]
              tier: 0
            - path: "cli/code-standards.md"
              tags: ["cli", "init", "upgrade", "merge", "platform", "version", "adapter"]
              tier: 1
    scripts:
        patterns:
            - "src/core/code-flow/scripts/**/*.py"
            - "tests/**/*.py"
        specs:
            - path: "scripts/_map.md"
              tags: ["*"]
              tier: 0
            - path: "scripts/code-standards.md"
              tags: ["hook", "inject", "config", "spec", "tag", "scan", "stats", "session", "log", "performance", "quality", "test"]
              tier: 1
