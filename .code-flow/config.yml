version: 1

budget:
    total: 2500
    l0_max: 800
    l1_max: 1700
    map_max: 400

inject:
    auto: true
    code_extensions:
        - ".py"
        - ".js"
    skip_extensions:
        - ".md"
        - ".txt"
        - ".json"
        - ".yml"
        - ".yaml"
        - ".toml"
        - ".lock"
    skip_paths:
        - "docs/**"
        - ".code-flow/**"
        - ".claude/**"
        - "node_modules/**"
        - ".git/**"

path_mapping:
    cli:
        patterns:
            - "src/cli.js"
            - "src/*.js"
        specs:
            - path: "cli/_map.md"
              tags: ["*"]
              tier: 0
            - path: "cli/code-standards.md"
              tags: ["cli", "init", "merge", "version", "file", "copy"]
              tier: 1
    scripts:
        patterns:
            - "src/core/**/*.py"
            - "**/*.py"
        specs:
            - path: "scripts/_map.md"
              tags: ["*"]
              tier: 0
            - path: "scripts/code-standards.md"
              tags: ["core", "hook", "inject", "config", "spec", "tag", "scan", "stat"]
              tier: 1
