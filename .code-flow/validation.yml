validators:
    - name: "Python 语法检查"
      trigger: "**/*.py"
      command: "python3 -m py_compile {files}"
      timeout: 30000
      on_fail: "检查语法错误"

    - name: "Pytest"
      trigger: "**/*.py"
      command: "python3 -m pytest --tb=short -q"
      timeout: 60000
      on_fail: "测试失败，检查断言和 mock 是否需要更新"

    # 暂缺：cli.js 的 lint。项目目前未引入 ESLint，留位待补
